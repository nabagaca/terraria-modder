name: Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement"]
body:
  - type: dropdown
    id: mod
    attributes:
      label: Which mod?
      options:
        - Core / Framework
        - AdminPanel
        - AutoBuffs
        - DebugTools
        - FpsUnlocked
        - ItemSpawner
        - PetChests
        - QuickKeys
        - SeedLab
        - SkipIntro
        - StorageHub
        - WhipStacking
        - New mod idea
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What would you like?
      description: Describe the feature or improvement
    validations:
      required: true

  - type: textarea
    id: why
    attributes:
      label: Why is this useful?
      description: What problem does this solve or what does it enable?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Have you thought of other ways to achieve this?
